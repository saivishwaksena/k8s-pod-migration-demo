<!DOCTYPE html>
<html>
<head>
  <title>Kubernetes Pod Migration Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      text-align: center;
      padding-top: 100px;
    }
    .card {
      background: rgba(255, 255, 255, 0.12);
      padding: 40px;
      margin: auto;
      width: 70%;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 42px;
    }
    p {
      font-size: 20px;
    }
    .badge {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Web Application Cluster Deployment</h1>
    <p>Controlled Pod Migration using Kubernetes</p>
    <p>1 Master Node + 2 Worker Nodes</p>
    <div class="badge">Application Running Successfully</div>
  </div>
</body>
</html>
